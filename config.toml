baseURL = 'https://universalamateur.gitlab.io/'
languageCode = 'en-us'
title = 'universalamateur'
theme = 'ananke'

contentdir    = "content"
layoutdir     = "layouts"
publishdir    = "public"
resourceDir = "resources"

DefaultContentLanguage = "en"
SectionPagesMenu = "main"
Paginate = 10 # this is set low for demonstrating with dummy content. Set to a higher number
googleAnalytics = ""
enableRobotsTXT = true

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  text_color = ""
  author = ""
  favicon = ""
  site_logo = ""
  description = "One more Blog in this world."
  # choose a background color from any on this page: http://tachyons.io/docs/themes/skins/ and preface it with "bg-"
  background_color_class = "bg-black"
  recent_posts_number = 10

[[params.ananke_socials]]
  name = "twitter"
  url = "https://twitter.com/falkosieverding"
[[params.ananke_socials]]
  name = "gitlab"
  url = "https://gitlab.com/fsieverding"
[[params.ananke_socials]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/falko-sieverding-universalamateur"
[[params.ananke_socials]]
  name = "github"
  url = "https://github.com/universalamateur"
